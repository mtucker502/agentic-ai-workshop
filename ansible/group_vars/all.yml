---
# Workshop VM configuration
workshop_vm_count: 10
workshop_vm_cpus: 2
workshop_vm_memory_mb: 4096
workshop_vm_disk_gb: 50

# Networking
workshop_vm_bridge: br-workshop
workshop_vm_network_name: workshop-net
workshop_vm_subnet: "192.168.122"
workshop_vm_gateway: "192.168.122.1"
workshop_vm_netmask: "255.255.255.0"
workshop_vm_ip_offset: 11
workshop_ssh_port_start: 2201
workshop_vm_dns: "8.8.8.8"

# Paths
workshop_base_image_url: "https://cloud-images.ubuntu.com/jammy/current/jammy-server-cloudimg-amd64.img"
workshop_base_image_path: "/var/lib/libvirt/images/ubuntu-22.04-base.img"
workshop_vm_images_dir: "/var/lib/libvirt/images"
workshop_cloudinit_dir: "/var/lib/libvirt/cloud-init"

# SSH - reads the operator's public key
workshop_ssh_pubkey: "{{ lookup('file', '~/.ssh/id_rsa.pub') }}"

# Generated inventory output path
workshop_inventory_path: "{{ playbook_dir }}/inventory-workshop.ini"
